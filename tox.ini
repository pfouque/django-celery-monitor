[tox]
env_list =
    py310-dj42
    py312-dj51
    lint
    package
    docs
skip_missing_interpreters = true

[testenv]
description = Run the unit test suite
package = skip
skip_install = true
deps =
    celery>=4.4,<6
    pytest>=8.3
    pytest-cov>=5
    pytest-django>=4.8
    pytz
    dj42: Django>=4.2,<5.0
    dj51: Django>=5.1,<5.2
setenv =
    PYTHONPATH = {tox_root}
commands =
    pytest -xv --cov=django_celery_monitor --cov-report=term --cov-report=xml --no-cov-on-fail

[testenv:lint]
description = Run static analysis and formatting checks
package = skip
skip_install = true
deps =
    ruff>=0.11.0
commands =
    ruff check .
    ruff format --check .

[testenv:package]
description = Build and validate the distribution artifacts
package = skip
skip_install = true
deps =
    build>=1.2
    check-manifest>=0.49
    readme-renderer>=44
    twine>=5.1
commands =
    python -m build --no-isolation
    twine check dist/*
    check-manifest -v

[testenv:docs]
description = Build the Sphinx documentation
package = skip
skip_install = true
deps =
    Django>=5.1,<5.2
    sphinx>=7.4
    sphinx-celery>=1.1
setenv =
    PYTHONPATH = {tox_root}
commands =
    sphinx-build -W -b html -d {envtmpdir}/doctrees docs {envtmpdir}/html

[gh-actions]
python =
    3.10: py310
    3.12: py312
