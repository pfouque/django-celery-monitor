name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            tox-envs: "py310-dj42,lint,package"
            upload-coverage: true
          - python-version: "3.12"
            tox-envs: "py312-dj51,lint,package"
            upload-coverage: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tox
        run: uv run tox -e ${{ matrix.tox-envs }}

      - name: Upload coverage
        if: matrix.upload-coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          name: Python ${{ matrix.python-version }}
